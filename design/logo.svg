<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 150" width="400" height="150">
  <!-- SCS Logo - Brutalist Linear Identity -->
  <!-- Pure geometric construction with straight lines only -->
  
  <rect width="400" height="150" fill="#FFFFFF"/>
  
  <!-- S - First letter -->
  <g transform="translate(20, 25)">
    <!-- Top horizontal bar -->
    <rect x="0" y="0" width="70" height="18" fill="#000000"/>
    <!-- Top-left vertical bar -->
    <rect x="0" y="0" width="18" height="45" fill="#000000"/>
    <!-- Middle horizontal bar -->
    <rect x="0" y="40" width="70" height="18" fill="#000000"/>
    <!-- Bottom-right vertical bar -->
    <rect x="52" y="40" width="18" height="45" fill="#000000"/>
    <!-- Bottom horizontal bar -->
    <rect x="0" y="82" width="70" height="18" fill="#000000"/>
  </g>
  
  <!-- C - Second letter -->
  <g transform="translate(120, 25)">
    <!-- Top horizontal bar -->
    <rect x="0" y="0" width="60" height="18" fill="#000000"/>
    <!-- Left vertical bar -->
    <rect x="0" y="0" width="18" height="100" fill="#000000"/>
    <!-- Bottom horizontal bar -->
    <rect x="0" y="82" width="60" height="18" fill="#000000"/>
  </g>
  
  <!-- S - Third letter -->
  <g transform="translate(210, 25)">
    <!-- Top horizontal bar -->
    <rect x="0" y="0" width="70" height="18" fill="#000000"/>
    <!-- Top-left vertical bar -->
    <rect x="0" y="0" width="18" height="45" fill="#000000"/>
    <!-- Middle horizontal bar -->
    <rect x="0" y="40" width="70" height="18" fill="#000000"/>
    <!-- Bottom-right vertical bar -->
    <rect x="52" y="40" width="18" height="45" fill="#000000"/>
    <!-- Bottom horizontal bar -->
    <rect x="0" y="82" width="70" height="18" fill="#000000"/>
  </g>
  
  <!-- Decorative accent line -->
  <rect x="20" y="140" width="260" height="3" fill="#000000"/>
</svg>